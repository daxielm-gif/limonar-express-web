<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control | Limonar Express</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Panel de Administración 📦</h1>
        <p>Gestiona el inventario de la tienda</p>
        <a href="index.html" style="text-decoration: none; color: #007bff;">⬅️ Volver a la Tienda</a>
    </header>

    <main>
        <section class="calculator-card">
            <h2>Añadir Nuevo Producto</h2>
            <form id="product-form">
                <div class="input-group">
                    <label>Nombre del Producto:</label>
                    <input type="text" id="name" placeholder="Ej: Aceite de Girasol" required>
                </div>
                <div class="input-group">
                    <label>Categoría:</label>
                    <select id="category">
                        <option value="Comida">Comida</option>
                        <option value="Aseo">Aseo</option>
                        <option value="Otros">Otros</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Zona de Entrega:</label>
                    <select id="location">
                        <option value="Limonar">Limonar (Yo)</option>
                        <option value="Matanzas">Matanzas (Amigo)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Precio en USD:</label>
                    <input type="number" id="price" step="0.01" required>
                </div>
                <div class="input-group">
                    <label>URL Imagen:</label>
                    <input type="text" id="image" placeholder="img/foto.jpg">
                </div>
                <button type="submit">Publicar Producto</button>
            </form>
        </section>

        <section class="calculator-card">
            <h2>Inventario Actual</h2>
            <div id="admin-product-list" class="product-grid"></div>
        </section>
    </main>

    <script>
        const productForm = document.getElementById('product-form');

        productForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const newProduct = {
                id: Date.now(),
                name: document.getElementById('name').value,
                category: document.getElementById('category').value,
                location: document.getElementById('location').value, // <--- GUARDANDO ZONA
                price: document.getElementById('price').value,
                image: document.getElementById('image').value || 'https://via.placeholder.com/150'
            };

            let products = JSON.parse(localStorage.getItem('productos_limonar')) || [];
            products.push(newProduct);
            localStorage.setItem('productos_limonar', JSON.stringify(products));

            alert('¡Producto subido con éxito!');
            productForm.reset();
            mostrarProductosAdmin();
        });

        function mostrarProductosAdmin() {
            const listContainer = document.getElementById('admin-product-list');
            let products = JSON.parse(localStorage.getItem('productos_limonar')) || [];
            listContainer.innerHTML = "";
            products.forEach(p => {
                listContainer.innerHTML += `
                    <div class="product-card" style="padding: 10px; border: 1px solid #ddd;">
                        <h4>${p.name}</h4>
                        <p>${p.location} - $${p.price}</p>
                        <button onclick="borrarProducto(${p.id})" style="background:#dc3545;">Eliminar</button>
                    </div>`;
            });
        }

        function borrarProducto(id) {
            if(confirm('¿Borrar producto?')) {
                let products = JSON.parse(localStorage.getItem('productos_limonar')) || [];
                products = products.filter(p => p.id !== id);
                localStorage.setItem('productos_limonar', JSON.stringify(products));
                mostrarProductosAdmin();
            }
        }
        window.onload = mostrarProductosAdmin;
    </script>
</body>
</html>
