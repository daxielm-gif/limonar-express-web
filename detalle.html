<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles del Producto - Limonar Express</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .detalle-container { max-width: 800px; margin: 20px auto; padding: 20px; background: white; border-radius: 15px; }
        .img-grande { width: 100%; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-height: 400px; object-fit: contain; background: #eee; }
        .info-tecnica { background: #f8f9fa; padding: 15px; border-radius: 10px; margin: 15px 0; border-left: 5px solid #007bff; }
        body.dark-mode .detalle-container { background: #1e1e1e; }
        body.dark-mode .info-tecnica { background: #2d2d2d; color: #eee; }
    </style>
</head>
<body>
    <header>
        <nav><a href="index.html" style="text-decoration: none; color: #007bff; font-weight: bold;">⬅️ Volver a la Tienda</a></nav>
    </header>

    <main class="detalle-container">
        <div id="contenido-detalle">
            <p style="text-align:center;">Cargando detalles del producto...</p>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        window.onload = () => {
            // Aplicar modo oscuro si está activo
            if (localStorage.getItem('tema') === 'oscuro') document.body.classList.add('dark-mode');
            
            // Obtener el producto guardado en la memoria
            const p = JSON.parse(localStorage.getItem('producto_seleccionado'));
            
            if (!p) {
                document.getElementById('contenido-detalle').innerHTML = "<h2>Producto no encontrado</h2>";
                return;
            }

            // Inyectar la información en el HTML
            const container = document.getElementById('contenido-detalle');
            // Busca esta parte dentro de detalle.html y asegúrate de que incluya esto:
container.innerHTML = `
    <img src="${p.image}" class="img-grande">
    <h1>${p.name}</h1>
    <h2 style="color: #2ecc71;">$${p.priceUSD} USD</h2>
    
    <div class="info-tecnica">
        <p><strong>📍 Zona:</strong> ${p.location}</p>
        <p><strong>🚚 Entrega:</strong> ${p.tipoEntrega}</p> 
        ${p.mapa ? `<p><strong>🗺️ Ubicación:</strong> <a href="${p.mapa}" target="_blank" style="color:#007bff;">Ver en Google Maps</a></p>` : ''}
        <p><strong>📝 Nota:</strong> ${p.descripcion}</p>
    </div>
    ...
`;
        };

        function agregarAlCarritoDetalle() {
            const p = JSON.parse(localStorage.getItem('producto_seleccionado'));
            let carrito = JSON.parse(localStorage.getItem('carrito')) || [];
            const itemExistente = carrito.find(item => item.id === p.id);
            
            if (itemExistente) { 
                itemExistente.cantidad += 1; 
            } else { 
                carrito.push({ ...p, cantidad: 1 }); 
            }
            
            localStorage.setItem('carrito', JSON.stringify(carrito));
            alert("¡Añadido al carrito!");
        }

        function preguntarWhatsApp(nombre) {
            const msj = `Hola! Me interesa el producto: *${nombre}*. ¿Está disponible y hacen envíos hoy?`;
            window.open(`https://wa.me/5358956989?text=${encodeURIComponent(msj)}`, '_blank');
        }
    </script>
</body>
</html>
